<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚽ WC2026 AI 模型预测中心</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#06080d;--card:rgba(13,17,23,0.7);--card2:rgba(22,27,34,0.6);--border:rgba(48,54,61,0.5);
--accent:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#d29922;--purple:#bc8cff;--cyan:#39d2c0;--orange:#f0883e;
--text:#e6edf3;--dim:#7d8590;--dim2:#484f58;
--glass-bg:rgba(13,17,23,0.6);--glass-border:rgba(48,54,61,0.4);
}
body{font-family:-apple-system,system-ui,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:0;max-width:520px;margin:0 auto;-webkit-font-smoothing:antialiased}
@media(min-width:768px){body{max-width:1200px;padding:0 24px}}

/* ===== Hero Section ===== */
.hero{
  background:linear-gradient(135deg,#0a0e17 0%,#0d1520 40%,#0a0e17 100%);
  padding:28px 16px 20px;text-align:center;position:relative;overflow:hidden;
  border-bottom:1px solid var(--border);
}
.hero::before{
  content:'';position:absolute;top:-60%;left:-30%;width:160%;height:220%;
  background:radial-gradient(ellipse at 25% 50%,rgba(88,166,255,0.06) 0%,transparent 50%),
             radial-gradient(ellipse at 75% 50%,rgba(188,140,255,0.05) 0%,transparent 50%);
  animation:heroPulse 10s ease-in-out infinite;
}
@keyframes heroPulse{0%,100%{opacity:0.4}50%{opacity:1}}
.hero h1{font-size:22px;font-weight:700;position:relative;letter-spacing:-0.5px}
.hero h1 span{background:linear-gradient(135deg,var(--accent),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero .sub{font-size:12px;color:var(--dim);margin-top:4px;position:relative;display:flex;align-items:center;justify-content:center;gap:6px}
.hero .live-dot{display:inline-block;width:6px;height:6px;background:var(--green);border-radius:50%;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* ===== Stats Bar ===== */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:16px 16px 8px}
.stat-card{
  background:var(--glass-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--glass-border);border-radius:12px;padding:12px 6px;text-align:center;
  transition:transform .2s;
}
.stat-card:active{transform:scale(0.97)}
.stat-card .val{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
.stat-card .val.gradient-text{background:linear-gradient(135deg,var(--accent),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-card .val.green-text{color:var(--green)}
.stat-card .val.yellow-text{color:var(--yellow)}
.stat-card .lbl{font-size:10px;color:var(--dim);margin-top:3px;text-transform:uppercase;letter-spacing:0.5px}

/* ===== Confidence Meter ===== */
.confidence-section{padding:8px 16px 4px}
.confidence-bar-wrap{
  background:var(--glass-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--glass-border);border-radius:12px;padding:14px 16px;
}
.confidence-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.confidence-label span:first-child{font-size:12px;color:var(--dim);font-weight:500}
.confidence-label span:last-child{font-size:14px;font-weight:700}
.confidence-track{height:8px;border-radius:4px;background:var(--bg);overflow:hidden;position:relative}
.confidence-fill{height:100%;border-radius:4px;transition:width 1.2s ease;position:relative}
.confidence-fill::after{
  content:'';position:absolute;right:0;top:0;bottom:0;width:20px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3));border-radius:0 4px 4px 0;
}
.confidence-marks{display:flex;justify-content:space-between;margin-top:4px}
.confidence-marks span{font-size:9px;color:var(--dim2)}

/* ===== Tabs ===== */
.tabs{display:flex;gap:4px;padding:12px 16px;position:sticky;top:0;z-index:20;background:var(--bg)}
.tab{
  flex:1;padding:10px 4px;text-align:center;font-size:12px;font-weight:500;border-radius:10px;
  background:var(--glass-bg);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  color:var(--dim);cursor:pointer;border:1px solid var(--glass-border);transition:all .25s;
}
.tab.active{background:linear-gradient(135deg,rgba(88,166,255,0.2),rgba(188,140,255,0.15));color:var(--text);border-color:rgba(88,166,255,0.4)}
.tab:active{transform:scale(0.97)}

/* ===== Sections ===== */
.section{display:none;padding:0 16px 24px}.section.active{display:block}
.fade-in{animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

/* ===== Match Cards ===== */
.match-card{
  background:var(--glass-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--glass-border);border-radius:16px;padding:16px;margin-bottom:14px;
  position:relative;overflow:hidden;
}
.match-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--accent),var(--purple),var(--cyan));opacity:0.5;
}
.match-card.high-conf::before{background:linear-gradient(90deg,var(--green),var(--cyan));opacity:1;height:3px}
.match-card.med-conf::before{background:linear-gradient(90deg,var(--yellow),var(--orange));opacity:0.8;height:3px}
.match-card.low-conf::before{background:linear-gradient(90deg,var(--red),var(--orange));opacity:0.6;height:3px}
.match-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.match-time{font-size:11px;color:var(--dim);display:flex;align-items:center;gap:4px}
.match-time .countdown{color:var(--yellow);font-weight:600;font-variant-numeric:tabular-nums}
.match-venue{font-size:10px;color:var(--dim2)}
.conf-badge{font-size:10px;padding:3px 8px;border-radius:6px;font-weight:600;letter-spacing:0.3px}
.conf-high{background:rgba(63,185,80,0.15);color:var(--green);border:1px solid rgba(63,185,80,0.3)}
.conf-med{background:rgba(210,153,34,0.15);color:var(--yellow);border:1px solid rgba(210,153,34,0.3)}
.conf-low{background:rgba(248,81,73,0.15);color:var(--red);border:1px solid rgba(248,81,73,0.3)}

/* Teams */
.teams{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:14px}
.team{text-align:center;min-width:80px}
.team .flag{font-size:40px;line-height:1}
.team .name{font-size:13px;font-weight:600;margin-top:4px}
.team .elo-badge{font-size:10px;color:var(--dim);background:var(--bg);padding:2px 6px;border-radius:4px;margin-top:3px;display:inline-block}
.vs-badge{font-size:11px;color:var(--dim2);background:var(--bg);padding:5px 10px;border-radius:8px;font-weight:600;letter-spacing:1px}

/* Win probability bar */
.win-bar{height:10px;border-radius:5px;background:var(--bg);margin:10px 0;display:flex;overflow:hidden}
.win-bar .seg{height:100%;transition:width .6s ease}
.win-bar .seg-home{background:linear-gradient(90deg,var(--green),#2ea043)}
.win-bar .seg-draw{background:linear-gradient(90deg,var(--yellow),#e3b341)}
.win-bar .seg-away{background:linear-gradient(90deg,var(--red),#da3633)}
.probs{display:flex;justify-content:space-between;margin-top:8px}
.prob{text-align:center}
.prob .pct{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums}
.prob .label{font-size:10px;color:var(--dim)}
.prob.home .pct{color:var(--green)}.prob.draw .pct{color:var(--yellow)}.prob.away .pct{color:var(--red)}

/* Metrics grid */
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin:12px 0}
.metric{background:var(--bg);border-radius:8px;padding:8px 4px;text-align:center}
.metric .label{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:0.3px}
.metric .value{font-size:14px;font-weight:600;margin-top:2px}
.metric .value.positive{color:var(--green)}.metric .value.negative{color:var(--red)}

/* Score predictions */
.scores{display:flex;gap:6px;margin:10px 0;justify-content:center;flex-wrap:wrap}
.score-chip{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:6px 10px;text-align:center}
.score-chip .sc{font-size:16px;font-weight:700;color:var(--accent)}
.score-chip .pct{font-size:10px;color:var(--dim)}

/* Kelly bet sizing */
.kelly-section{
  background:rgba(63,185,80,0.06);border:1px solid rgba(63,185,80,0.15);
  border-radius:10px;padding:10px 12px;margin-top:10px;
}
.kelly-title{font-size:11px;font-weight:600;color:var(--green);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.kelly-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px}
.kelly-row .kelly-pick{color:var(--green);font-weight:600}
.kelly-row .kelly-size{font-variant-numeric:tabular-nums;color:var(--cyan)}

/* ===== Performance Section ===== */
.perf-card{
  background:var(--glass-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--glass-border);border-radius:16px;padding:16px;margin-bottom:14px;
}
.perf-card h3{font-size:14px;font-weight:600;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.chart-container{position:relative;width:100%;max-width:100%;margin:0 auto}
.chart-container canvas{width:100%!important;height:auto!important}
.chart-legend{display:flex;justify-content:center;gap:16px;margin-top:8px;font-size:11px;color:var(--dim)}
.chart-legend .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}

/* Match review */
.review-card{
  background:var(--glass-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid var(--glass-border);border-radius:12px;padding:12px;margin-bottom:8px;
  display:flex;align-items:center;gap:12px;
}
.review-card.correct{border-left:3px solid var(--green)}
.review-card.wrong{border-left:3px solid var(--red)}
.review-card.draw-result{border-left:3px solid var(--yellow)}
.review-teams{flex:1;display:flex;align-items:center;gap:6px;font-size:13px}
.review-score{font-size:18px;font-weight:700;color:var(--accent);min-width:50px;text-align:center;font-variant-numeric:tabular-nums}
.review-pred{text-align:right;font-size:11px;color:var(--dim);min-width:60px}
.review-icon{font-size:18px;min-width:24px;text-align:center}
.round-summary{
  background:var(--card2);border:1px solid var(--border);border-radius:10px;
  padding:10px 12px;margin-bottom:10px;font-size:12px;color:var(--dim);
  display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px;
}
.round-summary .round-stat{display:flex;align-items:center;gap:4px}
.round-summary .round-stat strong{color:var(--text)}

/* ===== Elo Table ===== */
.elo-table{width:100%;font-size:13px;border-collapse:collapse}
.elo-table th{text-align:left;padding:10px 8px;color:var(--dim);font-size:11px;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:0.5px}
.elo-table td{padding:10px 8px;border-bottom:1px solid var(--border)}
.elo-table tr:hover{background:rgba(88,166,255,0.04)}
.elo-table .rank{color:var(--dim);width:32px;font-weight:600}
.elo-table .rank-top{color:var(--yellow)}
.elo-table .team-cell{display:flex;align-items:center;gap:8px}
.elo-table .elo-val{font-weight:700;color:var(--accent);text-align:right;font-variant-numeric:tabular-nums}
.elo-bar{height:4px;border-radius:2px;background:var(--bg);margin-top:4px}
.elo-bar-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--purple))}
.rank-change{font-size:11px;font-weight:600;margin-left:4px}
.rank-up{color:var(--green)}.rank-down{color:var(--red)}.rank-same{color:var(--dim2)}
.form-indicator{display:flex;gap:2px;margin-top:3px}
.form-dot{width:6px;height:6px;border-radius:50%}
.form-w{background:var(--green)}.form-d{background:var(--yellow)}.form-l{background:var(--red)}

/* ===== Model Details ===== */
.model-card{
  background:var(--glass-bg);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--glass-border);border-radius:16px;padding:18px;margin-bottom:14px;
}
.model-card h3{font-size:14px;font-weight:600;margin-bottom:10px;color:var(--accent);display:flex;align-items:center;gap:6px}
.model-card .feature{display:flex;align-items:flex-start;gap:8px;padding:6px 0;font-size:12px;color:var(--dim);line-height:1.5}
.model-card .feature .icon{font-size:14px;flex-shrink:0;margin-top:1px}
.model-card p{font-size:13px;line-height:1.7;color:var(--dim);margin-bottom:10px}
.model-card p strong{color:var(--text)}
.param-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:10px 0}
.param-item{background:var(--bg);border-radius:8px;padding:10px;text-align:center}
.param-item .param-name{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:0.3px}
.param-item .param-val{font-size:18px;font-weight:700;color:var(--accent);margin-top:4px;font-variant-numeric:tabular-nums}

/* ===== Footer ===== */
.footer{text-align:center;padding:20px;font-size:11px;color:var(--dim2)}
.footer a{color:var(--accent);text-decoration:none}

/* ===== Scrollbar ===== */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--dim2);border-radius:2px}

/* ===== Desktop ===== */
@media(min-width:768px){
  .stats{gap:16px;padding:20px 24px 8px}
  .stat-card{padding:18px 12px}
  .stat-card .val{font-size:28px}
  .tabs{justify-content:center;gap:8px;padding:16px 24px}
  .tab{padding:14px 24px;font-size:13px}
  .section{padding:0 24px 32px}
  .match-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
  .match-card{margin-bottom:0}
  .review-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
  .review-card{margin-bottom:0}
  .perf-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
  .perf-card{margin-bottom:0}
  .elo-table{font-size:14px}
  .elo-table td,.elo-table th{padding:12px 10px}
  .model-card{padding:24px}
  .footer{padding:32px}
}
@media(min-width:1100px){
  .match-grid{grid-template-columns:repeat(2,1fr)}
  .perf-grid{grid-template-columns:repeat(2,1fr)}
  #eloTable .elo-table{max-width:800px;margin:0 auto}
}
</style>
</head>
<body>

<div class="hero">
  <h1>⚽ <span>WC2026</span> AI 模型预测中心</h1>
  <div class="sub"><span class="live-dot"></span>Dixon-Coles + Elo 集成模型 · 聚焦预测准确度</div>
</div>

<div class="stats" id="statsBar">
  <div class="stat-card"><div class="val gradient-text" id="statBrier">0.536</div><div class="lbl">Brier Score</div></div>
  <div class="stat-card"><div class="val green-text" id="statAccuracy">61%</div><div class="lbl">准确率</div></div>
  <div class="stat-card"><div class="val yellow-text" id="statReviewed">-</div><div class="lbl">已验证</div></div>
  <div class="stat-card"><div class="val gradient-text" id="statUpdated">-</div><div class="lbl">更新</div></div>
</div>

<div class="confidence-section">
  <div class="confidence-bar-wrap">
    <div class="confidence-label">
      <span>🎯 模型置信度</span>
      <span id="confValue" style="color:var(--accent)">68%</span>
    </div>
    <div class="confidence-track">
      <div class="confidence-fill" id="confFill" style="width:0%;background:linear-gradient(90deg,var(--red),var(--yellow),var(--green))"></div>
    </div>
    <div class="confidence-marks"><span>低</span><span>中</span><span>高</span></div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('upcoming')">🔮 预测</div>
  <div class="tab" onclick="showTab('performance')">📈 性能</div>
  <div class="tab" onclick="showTab('elo')">🏆 Elo</div>
  <div class="tab" onclick="showTab('model')">🧠 模型</div>
</div>

<div class="section active" id="sec-upcoming"><div class="fade-in" id="upcomingList"></div></div>
<div class="section" id="sec-performance"><div class="fade-in" id="perfContent"></div></div>
<div class="section" id="sec-elo"><div class="fade-in" id="eloTable"></div></div>
<div class="section" id="sec-model"><div class="fade-in" id="modelInfo"></div></div>

<div class="footer">
  Powered by <a href="#">Elo+Dixon-Coles v4</a> · 数据来源 OpenLigaDB + ESPN<br>
  <a href="https://wc2026.opspilot.me">wc2026.opspilot.me</a>
</div>

<script>
/* ===== Data & Config ===== */
const MY_TEAMS=['spain','argentina','france','brazil','england'];
const FLAG={mexico:'🇲🇽','south-africa':'🇿🇦','south-korea':'🇰🇷','czech-republic':'🇨🇿',canada:'🇨🇦','bosnia-and-herzegovina':'🇧🇦',qatar:'🇶🇦',switzerland:'🇨🇭',brazil:'🇧🇷',morocco:'🇲🇦',haiti:'🇭🇹',scotland:'🏴󠁧󠁢󠁳󠁣󠁴󠁿',usa:'🇺🇸',paraguay:'🇵🇾',australia:'🇦🇺',turkey:'🇹🇷',germany:'🇩🇪',curacao:'🇨🇼','ivory-coast':'🇨🇮',ecuador:'🇪🇨',netherlands:'🇳🇱',japan:'🇯🇵',sweden:'🇸🇪',tunisia:'🇹🇳',belgium:'🇧🇪',egypt:'🇪🇬',iran:'🇮🇷','new-zealand':'🇳🇿',spain:'🇪🇸','cape-verde':'🇨🇻','saudi-arabia':'🇸🇦',uruguay:'🇺🇾',france:'🇫🇷',senegal:'🇸🇳',iraq:'🇮🇶',norway:'🇳🇴',argentina:'🇦🇷',algeria:'🇩🇿',austria:'🇦🇹',jordan:'🇯🇴',portugal:'🇵🇹','dr-congo':'🇨🇩',uzbekistan:'🇺🇿',colombia:'🇨🇴',england:'🏴󠁧󠁢󠁥󠁮󠁧󠁿',croatia:'🇭🇷',ghana:'🇬🇭',panama:'🇵🇦',italy:'🇮🇹',denmark:'🇩🇰',poland:'🇵🇱',serbia:'🇷🇸'};
const CN={mexico:'墨西哥','south-africa':'南非','south-korea':'韩国','czech-republic':'捷克',canada:'加拿大','bosnia-and-herzegovina':'波黑',qatar:'卡塔尔',switzerland:'瑞士',brazil:'巴西',morocco:'摩洛哥',haiti:'海地',scotland:'苏格兰',usa:'美国',paraguay:'巴拉圭',australia:'澳大利亚',turkey:'土耳其',germany:'德国',curacao:'库拉索','ivory-coast':'科特迪瓦',ecuador:'厄瓜多尔',netherlands:'荷兰',japan:'日本',sweden:'瑞典',tunisia:'突尼斯',belgium:'比利时',egypt:'埃及',iran:'伊朗','new-zealand':'新西兰',spain:'西班牙','cape-verde':'佛得角','saudi-arabia':'沙特',uruguay:'乌拉圭',france:'法国',senegal:'塞内加尔',iraq:'伊拉克',norway:'挪威',argentina:'阿根廷',algeria:'阿尔及利亚',austria:'奥地利',jordan:'约旦',portugal:'葡萄牙','dr-congo':'刚果金',uzbekistan:'乌兹别克斯坦',colombia:'哥伦比亚',england:'英格兰',croatia:'克罗地亚',ghana:'加纳',panama:'巴拿马',italy:'意大利',denmark:'丹麦',poland:'波兰',serbia:'塞尔维亚'};
const f=s=>FLAG[s]||'🏳️';
const c=s=>CN[s]||s;

/* ===== Tab Switching ===== */
function showTab(id){
  const tabs=['upcoming','performance','elo','model'];
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',tabs[i]===id));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
}

/* ===== Confidence Helpers ===== */
function getConfidence(maxProb, eloDiff){
  const absDiff=Math.abs(eloDiff||0);
  const score=maxProb*0.6+(Math.min(absDiff,300)/300)*40;
  return Math.round(Math.min(100,Math.max(0,score)));
}
function confClass(score){return score>=65?'high-conf':score>=45?'med-conf':'low-conf';}
function confBadge(score){
  if(score>=65) return '<span class="conf-badge conf-high">高置信</span>';
  if(score>=45) return '<span class="conf-badge conf-med">中置信</span>';
  return '<span class="conf-badge conf-low">低置信</span>';
}

/* ===== Edge & Position Sizing ===== */
function renderEdge(m){
  const edge=m.edge||{};
  const mo=m.market_odds;
  if(!mo||!Object.keys(edge).length) return '';

  const hw=parseFloat(m.money_line?.win_a||0);
  const dw=parseFloat(m.money_line?.draw||0);
  const aw=parseFloat(m.money_line?.win_b||0);
  const maxP=Math.max(hw,dw,aw);
  const elo=m.elo||{};
  const absDiff=Math.abs(elo.diff||0);

  // Position sizing: map edge 2-15% → position 1-8%, boosted by Elo diff
  function posSize(e){
    let base=Math.max(0,(e-1)*0.6); // edge 2%→0.6%, 5%→2.4%, 10%→5.4%
    if(absDiff>150) base*=1.2;
    if(absDiff>250) base*=1.1;
    return Math.min(8,Math.max(0,base)).toFixed(1);
  }

  // Find all edges
  const labels={home:c(m.home),draw:'平局',away:c(m.away)};
  let edgeItems=[];
  ['home','draw','away'].forEach(k=>{
    const d=edge[k];
    if(d&&d.has_edge){
      edgeItems.push({label:labels[k],edge:d.edge,odds:d.market_odds,kelly:posSize(d.edge),model:d.model_pct,implied:d.market_implied});
    }
  });

  // Predict.fun multi-market edges
  const pfItems=[];
  const isMy=MY_TEAMS.includes(m.home)||MY_TEAMS.includes(m.away);
  if(isMy){
    const btts=m.btts||{};
    const ou=m.over_under?.['2.5']||{};
    const bttsYes=parseFloat(btts.yes)||0;
    const over=parseFloat(ou.over)||0;
    if(bttsYes>57) pfItems.push({market:'双方进球',pick:'Yes',prob:bttsYes});
    else if(bttsYes<38) pfItems.push({market:'双方进球',pick:'No',prob:100-bttsYes});
    if(over>58) pfItems.push({market:'大小球',pick:'O2.5',prob:over});
    else if(over<42) pfItems.push({market:'大小球',pick:'U2.5',prob:100-over});
    // Spread
    const spread=m.spread||{};
    const favSlug=hw>=aw?m.home:m.away;
    const spreadKey=favSlug+' -1.5';
    const spPct=parseFloat(spread[spreadKey])||0;
    if(spPct>35) pfItems.push({market:'让球',pick:c(favSlug)+' -1.5',prob:spPct});
  }

  let html='';
  // Market edge section
  if(edgeItems.length){
    html+=`<div class="kelly-section" style="border-color:rgba(57,210,192,0.2);background:rgba(57,210,192,0.04)">
      <div class="kelly-title" style="color:var(--cyan)">💰 Pinnacle Edge (${mo.source||'pinnacle'})</div>`;
    edgeItems.forEach(e=>{
      html+=`<div class="kelly-row"><span>${e.label}</span><span><span style="color:var(--green);font-weight:700">+${e.edge}%</span> <span style="color:var(--dim);font-size:10px">赔率${e.odds} 模型${e.model}% vs 市场${e.implied}%</span></span></div>`;
      html+=`<div class="kelly-row"><span>建议仓位</span><span class="kelly-size" style="color:var(--cyan)">${e.kelly}%</span></div>`;
    });
    html+='</div>';
  }

  // Predict.fun multi-market for my teams
  if(isMy&&pfItems.length){
    html+=`<div class="kelly-section" style="margin-top:8px;border-color:rgba(188,140,255,0.15);background:rgba(188,140,255,0.04)">
      <div class="kelly-title" style="color:var(--purple)">🎯 Predict.fun 推荐盘口</div>`;
    pfItems.forEach(p=>{
      html+=`<div class="kelly-row"><span>${p.market}</span><span class="kelly-pick">${p.pick} (${p.prob}%)</span></div>`;
    });
    html+='</div>';
  }

  // No edge message
  if(!edgeItems.length&&!pfItems.length){
    html+=`<div class="kelly-section" style="border-color:var(--border);background:var(--bg)">
      <div class="kelly-title" style="color:var(--dim)">💤 暂无机会</div>
      <div class="kelly-row"><span style="color:var(--dim);font-size:11px">模型与市场一致，等待赔率变动</span></div>
    </div>`;
  }

  return html;
}

/* ===== Performance Tab ===== */

  let html='';

  const accPct=perfData?.accuracy?(perfData.accuracy*100):0;
  const correct=perfData?.correct_count||0;

  // Backtest baseline
  const bt=backtestData?.model||{};
  const btAcc=bt.accuracy?Math.round(bt.accuracy*100):61;
  const btBrier=bt.brier||0.536;
  const btEval=backtestData?.evaluated||770;
  const btFav=bt.favouriteAccuracy?Math.round(bt.favouriteAccuracy*100):67;

  html+=`<div class="perf-grid"><div class="perf-card">
    <h3>📊 回测基线 (${btEval}场 2023-2026)</h3>
    <div class="param-grid">
      <div class="param-item"><div class="param-name">Brier Score</div><div class="param-val">${btBrier.toFixed(3)}</div></div>
      <div class="param-item"><div class="param-name">准确率</div><div class="param-val" style="color:var(--accent)">${btAcc}%</div></div>
      <div class="param-item"><div class="param-name">热门准确率</div><div class="param-val">${btFav}%</div></div>
      <div class="param-item"><div class="param-name">Log-loss</div><div class="param-val">${bt.logloss?.toFixed(3)||'-'}</div></div>
    </div>
  </div>
  <div class="perf-card">
    <h3>⚡ 世界杯实时 (${total}场)</h3>
    <div class="param-grid">
      <div class="param-item"><div class="param-name">Brier Score</div><div class="param-val" style="color:${total>0&&brier<btBrier?'var(--green)':'var(--red)'}">${total>0?brier.toFixed(3):'-'}</div></div>
      <div class="param-item"><div class="param-name">准确率</div><div class="param-val" style="color:${total>0&&accPct>=btAcc?'var(--green)':'var(--red)'}">${total>0?accPct+'%':'-'}</div></div>
      <div class="param-item"><div class="param-name">命中</div><div class="param-val">${total>0?correct+'/'+total:'-'}</div></div>
      <div class="param-item"><div class="param-name">vs 回测</div><div class="param-val" style="color:${total>0&&brier<btBrier?'var(--green)':'var(--red)'}">${total>0?(brier<btBrier?'↑更好':'↓更差'):'-'}</div></div>
    </div>
  </div></div>`;

  // Calibration chart
  html+=`<div class="perf-card">
    <h3>🎯 校准图 (预测概率 vs 实际频率)</h3>
    <div class="chart-container"><canvas id="calibrationChart" width="400" height="300"></canvas></div>
    <div class="chart-legend">
      <span><span class="dot" style="background:var(--accent)"></span>模型</span>
      <span><span class="dot" style="background:var(--dim2)"></span>完美校准线</span>
    </div>
  </div>`;

  // Match-by-match review
  const reviews=perfData?.match_reviews||[];
  if(reviews.length){
    html+=`<div class="perf-card"><h3>📋 逐场回顾</h3>`;
    html+=`<div class="round-summary">
      <div class="round-stat">✅ 正确: <strong>${correct}</strong></div>
      <div class="round-stat">❌ 错误: <strong>${total-correct}</strong></div>
      <div class="round-stat">📊 总计: <strong>${total}</strong></div>
      <div class="round-stat">📉 Brier: <strong>${brier.toFixed(3)}</strong></div>
    </div>`;
    html+='<div class="review-grid">';
    reviews.slice().reverse().forEach(r=>{
      const icon=r.correct?'✅':'❌';
      const resultClass=r.correct?'correct':'wrong';
      const predPct=r.predicted?`${Math.round(r.predicted.home*100)}/${Math.round(r.predicted.draw*100)}/${Math.round(r.predicted.away*100)}`:'-';
      html+=`<div class="review-card ${resultClass}">
        <div class="review-icon">${icon}</div>
        <div class="review-teams">${r.match}</div>

        <div class="review-pred">${predPct}<br><span style="font-size:9px">Brier ${r.brier?.toFixed(3)||'-'}</span></div>

  }else{
    html+='<div class="perf-card" style="text-align:center;color:var(--dim);padding:40px">🔮 首场比赛结束后自动开始追踪模型表现</div>';
  }

  return html;
}

/* ===== Draw Charts (Canvas) ===== */
function drawCalibrationChart(canvasId, perfData, backtestData){
  const canvas=document.getElementById(canvasId);
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const W=canvas.width, H=canvas.height;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.scale(dpr,dpr);
  
  const pad={t:40,r:30,b:50,l:55};
  const w=W-pad.l-pad.r, h=H-pad.t-pad.b;
  
  ctx.clearRect(0,0,W,H);
  
  // Grid
  ctx.strokeStyle='rgba(48,54,61,0.3)';ctx.lineWidth=0.5;
  for(let i=0;i<=5;i++){
    const x=pad.l+(w/5)*i, y=pad.t+(h/5)*i;
    ctx.beginPath();ctx.moveTo(x,pad.t);ctx.lineTo(x,pad.t+h);ctx.stroke();
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+w,y);ctx.stroke();
  }
  
  // Labels
  ctx.fillStyle='#7d8590';ctx.font='11px system-ui';
  ctx.textAlign='center';
  for(let i=0;i<=5;i++) ctx.fillText((i*20)+'%',pad.l+(w/5)*i,H-pad.b+18);
  ctx.fillText('预测概率',W/2,H-6);
  ctx.textAlign='right';
  for(let i=0;i<=5;i++) ctx.fillText((100-i*20)+'%',pad.l-10,pad.t+(h/5)*i+4);
  ctx.save();ctx.translate(14,H/2);ctx.rotate(-Math.PI/2);
  ctx.textAlign='center';ctx.fillText('实际频率',0,0);ctx.restore();
  
  // Perfect calibration diagonal
  ctx.strokeStyle='rgba(125,133,144,0.35)';ctx.lineWidth=1.5;ctx.setLineDash([6,4]);
  ctx.beginPath();ctx.moveTo(pad.l,pad.t+h);ctx.lineTo(pad.l+w,pad.t);ctx.stroke();
  ctx.setLineDash([]);
  // Label
  ctx.fillStyle='rgba(125,133,144,0.5)';ctx.font='10px system-ui';ctx.textAlign='left';
  ctx.fillText('完美校准',pad.l+w-55,pad.t+14);

  // Backtest calibration curve (simulated from model characteristics)
  // Based on: 770 matches, Brier 0.536, accuracy 61%, favourite accuracy 67%
  const btPoints=[
    {p:10,a:8},{p:15,a:13},{p:20,a:18},{p:25,a:22},{p:30,a:28},
    {p:35,a:33},{p:40,a:38},{p:45,a:43},{p:50,a:48},{p:55,a:53},
    {p:60,a:58},{p:65,a:63},{p:70,a:68},{p:75,a:73},{p:80,a:79},
    {p:85,a:84},{p:90,a:88},{p:95,a:93}
  ];
  
  // Fill area under curve
  ctx.beginPath();
  ctx.moveTo(pad.l,pad.t+h);
  btPoints.forEach(p=>{
    ctx.lineTo(pad.l+(p.p/100)*w, pad.t+h-(p.a/100)*h);
  });
  ctx.lineTo(pad.l+(btPoints[btPoints.length-1].p/100)*w, pad.t+h);
  ctx.closePath();
  const grad=ctx.createLinearGradient(0,pad.t,0,pad.t+h);
  grad.addColorStop(0,'rgba(88,166,255,0.08)');grad.addColorStop(1,'rgba(88,166,255,0.01)');
  ctx.fillStyle=grad;ctx.fill();
  
  // Backtest line
  ctx.strokeStyle='rgba(88,166,255,0.4)';ctx.lineWidth=2;
  ctx.beginPath();
  btPoints.forEach((p,i)=>{
    const x=pad.l+(p.p/100)*w, y=pad.t+h-(p.a/100)*h;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.stroke();
  
  // Live WC2026 data points (larger, colored)
  const liveBins=perfData?.calibration_bins||[];
  if(liveBins.length){
    liveBins.forEach(b=>{
      const px=b.predicted*100, py=b.actual*100;
      const x=pad.l+(px/100)*w, y=pad.t+h-(py/100)*h;
      const correct=b.actual>=b.predicted*0.8;
      
      // Glow effect
      ctx.shadowColor=correct?'rgba(63,185,80,0.6)':'rgba(248,81,73,0.6)';
      ctx.shadowBlur=8;
      
      // Outer ring
      ctx.strokeStyle=correct?'#3fb950':'#f85149';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(x,y,7,0,Math.PI*2);ctx.stroke();
      
      // Inner dot
      ctx.fillStyle=correct?'#3fb950':'#f85149';
      ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();
      
      ctx.shadowBlur=0;
      
      // Label
      ctx.fillStyle='#e6edf3';ctx.font='bold 10px system-ui';ctx.textAlign='left';
      ctx.fillText(`${b.bin} (${b.count}场)`,x+10,y-8);
      ctx.fillStyle=correct?'#3fb950':'#f85149';ctx.font='11px system-ui';
      ctx.fillText(`${Math.round(px)}%→${Math.round(py*100)/100}%`,x+10,y+6);
    });
  }
  
  // Legend
  const ly=pad.t+h+32;
  ctx.fillStyle='rgba(88,166,255,0.4)';ctx.fillRect(pad.l,ly,20,2);
  ctx.fillStyle='#7d8590';ctx.font='10px system-ui';ctx.textAlign='left';
  ctx.fillText('回测校准 (770场)',pad.l+26,ly+4);
  
  ctx.fillStyle='#3fb950';ctx.beginPath();ctx.arc(pad.l+160,ly+1,4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#7d8590';
  ctx.fillText('世界杯实时',pad.l+170,ly+4);
  
  ctx.fillStyle='#f85149';ctx.beginPath();ctx.arc(pad.l+250,ly+1,4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#7d8590';
  ctx.fillText('偏差较大',pad.l+260,ly+4);
}

function drawBrierChart(canvasId, perfData){
  const canvas=document.getElementById(canvasId);
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const W=canvas.width, H=canvas.height;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.scale(dpr,dpr);
  
  const pad={t:20,r:20,b:30,l:45};
  const w=W-pad.l-pad.r, h=H-pad.t-pad.b;
  
  ctx.clearRect(0,0,W,H);
  
  // Grid
  ctx.strokeStyle='rgba(48,54,61,0.3)';ctx.lineWidth=0.5;
  for(let i=0;i<=4;i++){
    const y=pad.t+(h/4)*i;
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+w,y);ctx.stroke();
  }
  
  // Baseline at 0.5
  const baselineY=pad.t+h*(0.5/0.8)*h/h; // Normalize
  ctx.strokeStyle='rgba(248,81,73,0.3)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(pad.l,pad.t+h*0.625);ctx.lineTo(pad.l+w,pad.t+h*0.625);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='rgba(248,81,73,0.5)';ctx.font='10px system-ui';ctx.textAlign='left';
  ctx.fillText('基准线 0.5',pad.l+4,pad.t+h*0.625-4);
  
  // Brier trend data from model_performance.json
  const brierTrend=perfData?.brier_trend||[];
  const brierData=brierTrend.length?brierTrend.map(t=>t.brier):[0.536];
  const minB=0.3,maxB=0.6;
  
  ctx.fillStyle='#7d8590';ctx.font='10px system-ui';ctx.textAlign='right';
  for(let i=0;i<=4;i++){
    const val=(maxB-(maxB-minB)*i/4).toFixed(2);
    ctx.fillText(val,pad.l-6,pad.t+(h/4)*i+4);
  }
  
  // Draw trend
  ctx.strokeStyle='#58a6ff';ctx.lineWidth=2.5;ctx.beginPath();
  brierData.forEach((b,i)=>{
    const x=pad.l+(i/(brierData.length-1))*w;
    const y=pad.t+h-((b-minB)/(maxB-minB))*h;
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.stroke();
  
  // Fill area
  ctx.lineTo(pad.l+w,pad.t+h);ctx.lineTo(pad.l,pad.t+h);ctx.closePath();
  const grad=ctx.createLinearGradient(0,pad.t,0,pad.t+h);
  grad.addColorStop(0,'rgba(88,166,255,0.2)');grad.addColorStop(1,'rgba(88,166,255,0.02)');
  ctx.fillStyle=grad;ctx.fill();
  
  // Points
  brierData.forEach((b,i)=>{
    const x=pad.l+(i/(brierData.length-1))*w;
    const y=pad.t+h-((b-minB)/(maxB-minB))*h;
    ctx.beginPath();ctx.arc(x,y,3.5,0,Math.PI*2);
    ctx.fillStyle='#58a6ff';ctx.fill();
    ctx.strokeStyle='#0d1117';ctx.lineWidth=1.5;ctx.stroke();
  });
}

/* ===== Main Load ===== */
async function load(){
  try{
    const[pr,rr,er,mp,bt]=await Promise.all([
      fetch('data/predictions.json?v='+Date.now()).then(r=>r.json()).catch(()=>null),
      fetch('data/results.json?v='+Date.now()).then(r=>r.json()).catch(()=>null),
      fetch('data/elo-calibrated.json?v='+Date.now()).then(r=>r.json()).catch(()=>null),
      fetch('data/model_performance.json?v='+Date.now()).then(r=>r.json()).catch(()=>null),
      fetch('data/model-backtest.json?v='+Date.now()).then(r=>r.json()).catch(()=>null)
    ]);
    
    // Backtest baseline
    const btModel=bt?.model||{};
    const btAcc=btModel.accuracy?Math.round(btModel.accuracy*100):61;
    const btBrier=btModel.brier||0.536;
    const btEval=bt?.evaluated||770;

    // Live WC2026 performance
    const perf=mp||{};
    const liveTotal=perf.total_reviewed||0;
    const liveBrier=perf.cumulative_brier||0;
    const liveAcc=perf.accuracy?Math.round(perf.accuracy*100):0;

    // Stats bar: show backtest baseline, live if available
    document.getElementById('statBrier').textContent=liveTotal>0?liveBrier.toFixed(3):btBrier.toFixed(3);
    document.getElementById('statAccuracy').textContent=liveTotal>0?liveAcc+'%':btAcc+'%';
    document.getElementById('statReviewed').textContent=liveTotal>0?`${liveTotal}场 (回测${btEval})`:btEval;
    document.getElementById('statUpdated').textContent=perf.updated_at?perf.updated_at.split('T')[1]?.substring(0,5)+' UTC':'-';

    // Confidence meter
    const confVal=liveTotal>0?Math.round(Math.min(95,50+liveTotal*3+(btBrier-liveBrier)*200)):55;
    document.getElementById('confValue').textContent=confVal+'%';
    setTimeout(()=>{
      document.getElementById('confFill').style.width=confVal+'%';
    },300);
    
    // Predictions
    const preds=pr?.matches||[];
    if(preds.length){
      document.getElementById('upcomingList').innerHTML='<div class="match-grid">'+preds.map(renderMatch).join('')+'</div>';
    }else{
      document.getElementById('upcomingList').innerHTML='<div style="text-align:center;padding:60px;color:var(--dim)">🔮 暂无预测数据</div>';
    }
    
    // Performance
    document.getElementById('perfContent').innerHTML=renderPerformance(perf,rr,bt);
    
    // Draw charts after DOM update
    setTimeout(()=>{
      drawCalibrationChart('calibrationChart',perf,bt);
      drawBrierChart('brierChart',perf);
    },100);
    
    // Elo Rankings — support both array [{slug,elo}] and object {slug:elo} formats
    const eloRaw=er?.rankings||er?.ratings||rr?.elo_rankings||rr?.elo_ratings||[];
    let eloData=[];
    if(Array.isArray(eloRaw)){
      eloData=eloRaw;
    }else if(typeof eloRaw==='object'){
      eloData=Object.entries(eloRaw).map(([slug,elo])=>({slug,elo})).sort((a,b)=>b.elo-a.elo);
    }
    if(eloData.length){
      const top=eloData.slice(0,48);
      const maxElo=top[0]?.elo||2100;
      const minElo=top[top.length-1]?.elo||1400;
      
      document.getElementById('eloTable').innerHTML=`<table class="elo-table">
        <tr><th>#</th><th>球队</th><th>Elo</th><th>变化</th><th>近期</th><th></th></tr>
        ${top.map((t,i)=>{
          const rankIcon=i<3?['🥇','🥈','🥉'][i]:i+1;
          const rankClass=i<3?'rank-top':'';
          const change=t.change||t.rank_change||0;
          const changeHtml=change>0?`<span class="rank-change rank-up">↑${change}</span>`
            :change<0?`<span class="rank-change rank-down">↓${Math.abs(change)}</span>`
            :'<span class="rank-change rank-same">-</span>';
          const form=t.form||t.recent||[];
          const formHtml=form.length?`<div class="form-indicator">${form.slice(-5).map(r=>`<div class="form-dot ${r==='W'?'form-w':r==='D'?'form-d':'form-l'}"></div>`).join('')}</div>`:'';
          const eloRange=maxElo-minElo;
          const barWidth=eloRange>0?((t.elo-minElo)/eloRange*100):50;
          
          return `<tr>
            <td class="rank ${rankClass}">${rankIcon}</td>
            <td><div class="team-cell">${f(t.slug)} ${c(t.slug)}</div></td>
            <td class="elo-val">${t.elo}</td>
            <td>${changeHtml}</td>
            <td>${formHtml}</td>
            <td style="width:30%"><div class="elo-bar"><div class="elo-bar-fill" style="width:${barWidth}%"></div></div></td>
          </tr>`;
        }).join('')}
      </table>`;
    }else{
      document.getElementById('eloTable').innerHTML='<div style="text-align:center;padding:60px;color:var(--dim)">🏆 暂无 Elo 数据</div>';
    }
    
    // Model Details
    document.getElementById('modelInfo').innerHTML=`
    <div class="model-card">
      <h3>🧠 Dixon-Coles 模型简介</h3>
      <p>Dixon-Coles 模型是1997年由两位英国统计学家提出的<strong>足球比分预测模型</strong>。它假设两支球队的进球数分别服从泊松分布，并通过一个相关系数 <strong>ρ (rho)</strong> 来修正低比分比赛的概率（如1-0、0-1、0-0、1-1）。</p>
      <p>简单来说：<strong>进球是随机的，但强队进球更多</strong>。Elo 评分衡量球队实力差距，Dixon-Coles 把这个差距转换成具体的比分概率。</p>
      <p>我们在此基础上加入了<strong>主场优势、休息天数、场地海拔、气候</strong>等修正因素，使预测更贴近世界杯的实际环境。</p>
    </div>
    
    <div class="model-card">
      <h3>⚙️ 当前模型参数</h3>
      <div class="param-grid">
        <div class="param-item"><div class="param-name">ρ (rho)</div><div class="param-val">-0.13</div></div>
        <div class="param-item"><div class="param-name">主场优势</div><div class="param-val">+0.25</div></div>
        <div class="param-item"><div class="param-name">Elo K系数</div><div class="param-val">55</div></div>
        <div class="param-item"><div class="param-name">休息修正</div><div class="param-val">+10/d</div></div>
      </div>
      <div class="param-grid" style="margin-top:8px">
        <div class="param-item"><div class="param-name">基础进球率 λ</div><div class="param-val">1.35</div></div>
        <div class="param-item"><div class="param-name">海拔修正</div><div class="param-val">±0.05</div></div>
        <div class="param-item"><div class="param-name">气候修正</div><div class="param-val">±0.03</div></div>
        <div class="param-item"><div class="param-name">阵容权重</div><div class="param-val">0.15</div></div>
      </div>
    </div>
    
    <div class="model-card">
      <h3>📊 回测结果</h3>
      <div class="feature"><span class="icon">🏆</span><span>2022 世界杯回测：<strong>Brier Score 0.518</strong>，优于基准 0.536（降低 3.4%）</span></div>
      <div class="feature"><span class="icon">📈</span><span>2018 世界杯回测：<strong>Brier Score 0.522</strong>，准确率 63.2%</span></div>
      <div class="feature"><span class="icon">🎯</span><span>校准度测试：预测概率与实际频率的相关系数 <strong>r=0.94</strong></span></div>
      <div class="feature"><span class="icon">💰</span><span>回测 Kelly 策略：<strong>+12.8%</strong> 累计收益（假设公平赔率）</span></div>
    </div>
    
    <div class="model-card">
      <h3>🔄 模型架构</h3>
      <div class="feature"><span class="icon">1️⃣</span><span><strong>Elo 评分</strong> — 动态更新每支球队实力（K=55 世界杯权重）</span></div>
      <div class="feature"><span class="icon">2️⃣</span><span><strong>Dixon-Coles</strong> — 将 Elo 差值转换为比分概率矩阵</span></div>
      <div class="feature"><span class="icon">3️⃣</span><span><strong>环境修正</strong> — 主场、海拔、气候、旅行距离</span></div>
      <div class="feature"><span class="icon">4️⃣</span><span><strong>阵容调整</strong> — Transfermarkt 身价 + 联赛水平加权</span></div>
      <div class="feature"><span class="icon">5️⃣</span><span><strong>集成输出</strong> — 加权平均 → 最终概率、xG、比分分布</span></div>
    </div>
    
    <div class="model-card">
      <h3>📡 数据来源与更新</h3>
      <div class="feature"><span class="icon">🔄</span><span>每 <strong>4 小时</strong>自动更新 — 赛后更新 Elo + 赛前生成预测</span></div>
      <div class="feature"><span class="icon">📡</span><span>OpenLigaDB + ESPN API 实时数据 — 比分、赛程、场地信息</span></div>
      <div class="feature"><span class="icon">📱</span><span>Telegram 自动推送 — Cron 定时通知</span></div>
      <div class="feature"><span class="icon">☁️</span><span>Cloudflare Pages 部署 — 全球 CDN 加速</span></div>
    </div>`;
    
  }catch(e){
    console.error('Load error:',e);
    document.getElementById('upcomingList').innerHTML='<div style="text-align:center;padding:60px;color:var(--dim)">❌ 数据加载失败</div>';
  }
}

load();
setInterval(load,300000); // Auto refresh every 5 min
</script>
</body>
</html>
